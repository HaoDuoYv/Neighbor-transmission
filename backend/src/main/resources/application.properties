# Server Configuration
server.port=8081

# Application Configuration
spring.application.name=websocket-chat

# Local File Upload Configuration (苍穹外卖风格)
# 本地存储路径（相对于 backend 目录）
local.local-url=uploads
# Web访问URL前缀（用于生成访问链接）
local.web-url=/files
# 最大文件大小（500MB）
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# 启用文件上传
spring.servlet.multipart.enabled=true

# Logging Configuration
logging.level.com.chat=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.file.name=logs/application.log

# Discovery Configuration
discovery.multicast-group=224.0.0.167
discovery.multicast-port=9999
discovery.alias=${DISCOVERY_ALIAS:WebSocket Chat Server}

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:./data/chat.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.default_constraint_mode=NO_CONSTRAINT
spring.jpa.show-sql=false

# Snowflake ID Generator Configuration
snowflake.machine-id=0

# JWT Configuration
jwt.secret=${JWT_SECRET:WebSocketChatDefaultSecretKey2024!PleaseChangeInProduction}
jwt.expiration=604800000

# Spring AI Configuration
# 禁用自动配置，使用动态配置
spring.ai.openai.api-key=sk-placeholder
spring.ai.openai.base-url=https://api.openai.com
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
# 禁用Spring AI自动配置
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

